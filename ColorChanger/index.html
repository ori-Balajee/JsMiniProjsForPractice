<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="Container">
        <h1 class="title">Color Changer</h1>

        <div class="btnContainer">
            <button class="randombtn">Random Color</button>
            <input id="input" type ="text" placeholder="Enter a Color">
            <button class="setbtn">Set Color</button>
        </div>

        <p class="currClr">
            Current Color: <Span class="currClrVal">BISQUE</Span>
        </p>

    </div>

    <script src="index.js"></script>
</body>
</html>
